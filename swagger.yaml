openapi: 3.0.0
info:
  title: Products Service API
  version: 1.0.0
paths:
  /products:
    get:
      summary: Returns a list of products
      responses:
        '200':
          description: A JSON array of products
  /products/{productId}:
    get:
      summary: Returns a product by ID
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A single product object
        '404':
          description: Product not found