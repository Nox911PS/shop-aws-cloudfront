openapi: 3.0.0
info:
  title: Products Service API
  version: 1.0.0
paths:
  /products:
    get:
      summary: Returns a list of products
      responses:
        '200':
          description: A JSON array of products
  /products/{productId}:
    get:
      summary: Returns a product by ID
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A single product object
        '404':
          description: Product not found
components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          example: '7567ec4b-b10c-48c5-9345-fc73c48a80a2'
        title:
          type: string
          example: 'Product One'
        description:
          type: string
          example: 'Short Description'
        price:
          type: integer
          example: 24
        count:
          type: integer
          example: 10
